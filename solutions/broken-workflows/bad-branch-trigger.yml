# Intentionally broken for Lab 11 troubleshooting practice.
name: Broken Branch Trigger

on:
  push:
    branches:
      - production

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - run: npm ci
        working-directory: app
