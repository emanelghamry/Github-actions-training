name: Pull Request CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

defaults:
  run:
    working-directory: app

jobs:
  pr-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
